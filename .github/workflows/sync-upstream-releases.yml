name: 同步上游 Releases（默认密钥优先，失败后用备用密钥）

on:
  workflow_dispatch:
  schedule:
    - cron: "15 */6 * * *"

permissions:
  contents: write

concurrency:
  group: sync-upstream-releases
  cancel-in-progress: false

jobs:
  sync:
    name: 同步上游发布包
    runs-on: ubuntu-latest
    env:
      UPSTREAM_REPO: vtumi/ChromiumManager
      TARGET_REPO: ${{ github.repository }}

    steps:
      - name: 检出当前仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ github.token }}
          persist-credentials: false

      - name: 配置 Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: 添加上游仓库
        run: |
          git remote remove upstream 2>/dev/null || true
          git remote add upstream "https://github.com/${UPSTREAM_REPO}.git"

      - name: 同步上游 Releases
        env:
          DEFAULT_GH_TOKEN: ${{ github.token }}
          FALLBACK_GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
        shell: bash
        run: |
          set -Eeuo pipefail
          shopt -s nullglob

          tmp_root="$(mktemp -d)"
          trap 'rm -rf "$tmp_root"' EXIT

          default_push_url="https://x-access-token:${DEFAULT_GH_TOKEN}@github.com/${TARGET_REPO}.git"
          fallback_push_url=""
          if [ -n "${FALLBACK_GH_TOKEN:-}" ]; then
            fallback_push_url="https://x-access-token:${FALLBACK_GH_TOKEN}@github.com/${TARGET_REPO}.git"
          fi

          check_tag_exists() {
            local url="$1"
            local tag="$2"
            local output=""

            if ! output="$(git ls-remote --tags "$url" "refs/tags/${tag}" 2>/dev/null)"; then
              return 2
            fi

            if [ -n "$output" ]; then
              return 0
            fi

            return 1
          }

          push_tag_with_fallback() {
            local tag="$1"

            if git push "$default_push_url" "refs/tags/${tag}:refs/tags/${tag}"; then
              return 0
            fi

            local status=$?

            if [ -n "${fallback_push_url:-}" ]; then
              echo "默认密钥推送标签失败，改用备用密钥重试：$tag"
              git push "$fallback_push_url" "refs/tags/${tag}:refs/tags/${tag}"
              return $?
            fi

            return $status
          }

          create_release_with_fallback() {
            if GH_TOKEN="$DEFAULT_GH_TOKEN" gh release create "$@"; then
              return 0
            fi

            local status=$?

            if [ -n "${FALLBACK_GH_TOKEN:-}" ]; then
              echo "默认密钥创建 Release 失败，改用备用密钥重试：$1"
              GH_TOKEN="$FALLBACK_GH_TOKEN" gh release create "$@"
              return $?
            fi

            return $status
          }

          mapfile -t RELEASE_ROWS < <(
            GH_TOKEN="$DEFAULT_GH_TOKEN" gh api --paginate \
              -H "Accept: application/vnd.github+json" \
              "repos/$UPSTREAM_REPO/releases?per_page=100" \
              --jq '.[] | @base64'
          )

          if [ "${#RELEASE_ROWS[@]}" -eq 0 ]; then
            echo "上游仓库未找到任何 Releases：$UPSTREAM_REPO"
            exit 0
          fi

          for row in "${RELEASE_ROWS[@]}"; do
            json="$(printf '%s' "$row" | base64 -d)"

            tag="$(jq -r '.tag_name' <<<"$json")"
            name="$(jq -r '.name // .tag_name' <<<"$json")"
            body="$(jq -r '.body // ""' <<<"$json")"
            draft="$(jq -r '.draft' <<<"$json")"
            prerelease="$(jq -r '.prerelease' <<<"$json")"
            asset_count="$(jq -r '.assets | length' <<<"$json")"

            if [ "$draft" = "true" ]; then
              echo "跳过草稿版本：$tag"
              continue
            fi

            echo "========================================"
            echo "正在处理版本：$tag"

            tag_exists="false"
            release_exists="false"

            # 检查目标仓库是否已有标签
            if check_tag_exists "$default_push_url" "$tag"; then
              tag_exists="true"
              echo "目标仓库已存在标签：$tag"
            else
              status=$?
              if [ "$status" -eq 2 ] && [ -n "${fallback_push_url:-}" ]; then
                echo "默认密钥检查标签失败，改用备用密钥检查：$tag"
                if check_tag_exists "$fallback_push_url" "$tag"; then
                  tag_exists="true"
                  echo "目标仓库已存在标签：$tag"
                else
                  status=$?
                  if [ "$status" -eq 1 ]; then
                    echo "目标仓库不存在标签：$tag"
                  else
                    echo "检查标签失败：$tag"
                    exit 1
                  fi
                fi
              else
                if [ "$status" -eq 1 ]; then
                  echo "目标仓库不存在标签：$tag"
                else
                  echo "检查标签失败：$tag"
                  exit 1
                fi
              fi
            fi

            # 检查目标仓库是否已有 Release
            if GH_TOKEN="$DEFAULT_GH_TOKEN" gh release view "$tag" --repo "$TARGET_REPO" >/dev/null 2>&1; then
              release_exists="true"
              echo "目标仓库已存在 Release：$tag"
            else
              echo "目标仓库不存在 Release：$tag"
            fi

            if [ "$tag_exists" = "true" ] && [ "$release_exists" = "true" ]; then
              echo "标签和 Release 都已存在，跳过：$tag"
              continue
            fi

            notes_file="$tmp_root/${tag}.md"
            printf '%s' "$body" > "$notes_file"

            asset_dir="$tmp_root/assets-$tag"
            mkdir -p "$asset_dir"

            if [ "$asset_count" -gt 0 ]; then
              echo "正在下载上游附件：$tag"
              GH_TOKEN="$DEFAULT_GH_TOKEN" gh release download "$tag" \
                --repo "$UPSTREAM_REPO" \
                --dir "$asset_dir"
            else
              echo "该版本没有附件：$tag"
            fi

            files=( "$asset_dir"/* )

            if [ "$tag_exists" = "false" ]; then
              echo "正在同步标签到目标仓库：$tag"
              git fetch --force upstream "refs/tags/$tag:refs/tags/$tag"
              push_tag_with_fallback "$tag"
            fi

            if [ "$release_exists" = "false" ]; then
              echo "正在创建 Release：$tag"

              create_args=(
                "$tag"
                --repo "$TARGET_REPO"
                --title "$name"
                --notes-file "$notes_file"
                --draft=false
                --verify-tag
              )

              if [ "$prerelease" = "true" ]; then
                create_args+=(--prerelease)
              fi

              if [ "${#files[@]}" -gt 0 ] && [ -e "${files[0]}" ]; then
                echo "创建 Release 并上传附件：$tag"
                create_release_with_fallback "${create_args[@]}" "${files[@]}"
              else
                echo "创建 Release（无附件）：$tag"
                create_release_with_fallback "${create_args[@]}"
              fi
            fi

            echo "处理完成：$tag"
          done

          echo "全部同步完成"
